<!DOCTYPE html>
<html lang="en">

<head>
    <title>My First Page</title>

    <style>

        body {
            background-color: lightblue;
            font-family: Arial;
        }

        header {
            background-color: darkblue;
            color: white;
            text-align: center;
            padding: 10px;
        }

        nav {
            background-color: gray;
            padding: 10px;
        }

        nav a {
            color: white;
            margin: 10px;
        }

        section {
            background-color: white;
            margin: 20px;
            padding: 15px;
        }

        footer {
            background-color: black;
            color: white;
            text-align: center;
            padding: 10px;
        }

    </style>
</head>

<body>

    <!-- Header -->
    <header>
        <h1 title="Website Name">My Website</h1>
    </header>

    <!-- Navigation -->
    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
    </nav>

    <!-- Main Content -->
    <section>

        <h2 style="color:red;">Welcome</h2>

        <p>
            This is a basic HTML5 page.
        </p>

        <!-- Image -->
        <img 
            src="https://via.placeholder.com/200"
            alt="Sample Image"
            width="200"
        >

        <br><br>

        <!-- Input -->
        <input 
            type="text"
            placeholder="Enter your name"
        >

        <button>
            Submit
        </button>

    </section>

    <!-- Footer -->
    <footer>
        <p>Created by Naresh</p>
    </footer>

</body>
</html>
